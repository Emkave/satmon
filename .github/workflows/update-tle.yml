name: Update TLE Data

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  update-tle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch TLE from Celestrak
        run: |
          curl -f -o public/tle.txt \
            -H "User-Agent: satmon-orbital-tracker/1.0" \
            "https://celestrak.org/NORAD/elements/gp.php?GROUP=active&FORMAT=tle"

      - name: Commit and push if changed
        run: |
          git config user.name  "TLE Bot"
          git config user.email "tle-bot@satmon"
          git add public/tle.txt
          git diff --staged --quiet || git commit -m "chore: update TLE data [$(date -u '+%Y-%m-%d %H:%M UTC')]" && git push
